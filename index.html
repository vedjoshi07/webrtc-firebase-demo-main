<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VideoLink – Instant Video Calls</title>
    <meta name="description" content="Simple 1-to-1 video calls powered by WebRTC. No account needed." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>

    <div class="app">
      
      <!-- Login Screen -->
      <div id="loginScreen" class="screen active">
        <div class="header">
          <div class="logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="23 7 16 12 23 17 23 7"></polygon>
              <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
            </svg>
            VideoLink
          </div>
        </div>
        <div class="main flex-center">
          <div class="card login-card">
            <h2>Welcome</h2>
            <p class="text-muted">Enter a name to join the network and see who is online.</p>
            <input type="text" id="usernameInput" placeholder="Your name" class="input-field" />
            <button id="loginBtn" class="btn btn-primary full-width">Join Network</button>
          </div>
        </div>
      </div>

      <!-- Contacts Screen -->
      <div id="contactsScreen" class="screen">
        <div class="header">
          <div class="logo">Contacts</div>
          <span class="badge" id="myUsernameBadge">Me</span>
        </div>
        <div class="main">
          <p class="text-muted">Select a contact to call</p>
          <div class="contacts-list" id="contactsList">
            <!-- Contacts will be injected here -->
          </div>
        </div>
      </div>

      <!-- Active Call Screen (Full Screen) -->
      <div id="callScreen" class="screen call-screen">
        <!-- Remote Video Background -->
        <video id="remoteVideo" autoplay playsinline class="video-full"></video>
        <div class="video-placeholder" id="remotePlaceholder">
          <div class="spinner"></div>
          <span>Connecting...</span>
        </div>

        <!-- Local Video PIP -->
        <div class="pip-container">
          <video id="webcamVideo" autoplay playsinline muted class="video-pip"></video>
          <div class="video-placeholder" id="localPlaceholder">
            <span>Camera Off</span>
          </div>
        </div>

        <!-- Call Info Overlay -->
        <div class="call-info">
          <h2 id="callPeerName">Unknown</h2>
          <span class="call-timer" id="callTimer">Ringing...</span>
        </div>

        <!-- Floating Controls -->
        <div class="call-controls">
          <button id="muteBtn" class="control-btn" title="Mute Audio">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
              <line x1="12" y1="19" x2="12" y2="23"></line>
              <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
          </button>
          <button id="videoToggleBtn" class="control-btn" title="Turn off Video">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="23 7 16 12 23 17 23 7"></polygon>
              <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
            </svg>
          </button>
          <button id="hangupBtn" class="control-btn btn-danger-solid" title="End Call">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67m-2.67-3.34a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 3.59 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96"></path>
            </svg>
          </button>
        </div>
      </div>

      <!-- Incoming Call Overlay -->
      <div id="incomingCallOverlay" class="incoming-overlay hidden">
        <div class="incoming-card">
          <div class="caller-avatar">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </div>
          <h3 id="incomingCallerName">Someone</h3>
          <p>is calling you...</p>
          <div class="incoming-actions">
            <button id="declineBtn" class="btn btn-danger-solid round-btn">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67m-2.67-3.34a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 3.59 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96"></path>
              </svg>
            </button>
            <button id="acceptBtn" class="btn btn-success-solid round-btn heartbeat">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.45 2 2 0 0 1 3.59 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6 6l.92-.92a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16.92z"></path>
              </svg>
            </button>
          </div>
        </div>
      </div>

    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
